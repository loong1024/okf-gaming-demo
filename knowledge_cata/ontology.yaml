# getapps — Data Layer (table, column nodes)

# --- Tables ---

- id: table.dwd_iap_order
  type: table
  name: IAP 订单明细表
  table_name: dwd_iap_order
  description: IAP 联运订单明细表，每笔订单一行。pay_type!=1 排除测试订单
  grain: event
  timestamp_column: date
  primary_keys:
  - order_id
  partitions:
  - date
  database: iceberg_alsgprc_hadoop
  owner: wenchao
  schema: getapps
- id: table.dwd_user_event_log
  type: table
  name: 用户事件日志表
  table_name: dwd_user_event_log
  description: GetApps 核心埋点明细表，记录所有 action_type 事件，用户标识为 gaid。所有 GA 
    口径指标的数据源。支持渠道归因和场景分析。
  grain: event
  timestamp_column: date
  primary_keys:
  - gaid
  - date
  - action_type
  database: iceberg_alsgprc_hadoop
  partitions:
  - date
  owner: wenchao
  schema: getapps
- id: column.dwd_iap_order.order_id
  type: column
  name: order_id
  table: table.dwd_iap_order
  data_type: STRING
  description: 订单唯一ID
  entity: entity.order

- id: column.dwd_iap_order.user_id
  type: column
  name: user_id
  table: table.dwd_iap_order
  data_type: STRING
  description: 用户唯一ID
  entity: entity.user

- id: column.dwd_iap_order.pay_status
  type: column
  name: pay_status
  table: table.dwd_iap_order
  data_type: INT
  description: 支付状态，0=拉起收银台 1=点击支付 2=支付成功 3=关单 5=已发起退款 6=退款成功

- id: column.dwd_iap_order.pay_type
  type: column
  name: pay_type
  table: table.dwd_iap_order
  data_type: INT
  description: 支付类型，1=测试订单需排除

- id: column.dwd_iap_order.pay_mid
  type: column
