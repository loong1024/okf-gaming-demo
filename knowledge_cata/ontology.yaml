- id: table.ads_getapps_app_retain_stay_d_v2
  name: 应用保有率预计算表
  type: table
  grain: daily_app_country
  schema: getapps
  partitions:
  - date
  table_name: ads_getapps_app_retain_stay_d_v2
  description: ADS 层应用保有率预计算表，基于 MIUIBI 安装事件体系（imeimd5 标识）。retain_stay_n 
    为保有天数，retain_denominator 为基准日新增安装数，retain_numerator 为第 N 天保有数。已过滤日活 < 100 
    或新增 < 1000 的包
  timestamp_column: date
  owner: zhangzhening
  database: iceberg_alsgprc_hadoop
- id: table.ads_getapps_app_act_retain_stay_d_v2
  name: 应用活跃留存预计算表
  type: table
  grain: daily_app_country
  schema: getapps
  partitions:
  - date
  table_name: ads_getapps_app_act_retain_stay_d_v2
  description: ADS 层应用活跃留存预计算表，retain_stay_n 枚举值为 2/7/30（不含 N=1 
    次日留存），retain_denominator 为基准日活跃用户数，retain_numerator 为第 N 天留存用户数
  timestamp_column: date
  owner: zhangzhening
  database: iceberg_alsgprc_hadoop
- id: table.dim_appstore_app_country_snapshot_d
  name: 应用国家维度快照表
  type: table
  layer: DIM
  owner: wenchao
  database: appstore
  schedule: 每天 02:30
  full_name: iceberg_alsgprc_hadoop.appstore.dim_appstore_app_country_snapshot_d
  partition: date (YYYYMMDD)
  description: 
    GetApps(小米应用商店)应用维度快照表，按国家维度记录每个应用每天的完整属性信息。包含应用基础信息(名称/包名/开发者/版本)、上架状态(GA/GP)、分类标签、质量分级(S/A/B/C/D/E)、联运类型、版本一致性、高风险标记、系统应用类型等维度，以及当日首次启动用户数指标。
  granularity: appid × country × date
  key_metrics:
  - day_first_launch
  - total_day_first_launch
  key_dimensions:
  - country
  - ga_status
  - intlcategory_level1
  - app_level
  - payment_sdk
  - system_app_type
